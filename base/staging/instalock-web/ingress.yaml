apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: instalock-web-web
  namespace: staging
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`staging.instalock.app`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: instalock-web
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: instalock-web-websecure
  namespace: staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`staging.instalock.app`) && (PathPrefix(`/metrics`)
      kind: Rule
      middlewares:
        - name: basic-auth
      services:
        - name: instalock-web
          port: 80
    - match: Host(`staging.instalock.app`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: instalock-web
          port: 80
  tls:
    secretName: staging-instalock-web-tls
