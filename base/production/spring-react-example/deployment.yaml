apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-react-example
  namespace: production
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spring-react-example
  template:
    metadata:
      labels:
        app: spring-react-example
    spec:
      containers:
        - name: spring-react-example
          image: tahminator/spring-react-example
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          envFrom:
            - secretRef:
                name: spring-react-example-production-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "10m"
            limits:
              memory: "384Mi"
              cpu: "500m"
