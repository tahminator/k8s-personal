apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - certificate.yaml
commonLabels:
  app: abclang
  environment: production
images:
  - name: tahminator/abclang
    newTag: 1.0.14

replacements:
  - source:
      kind: Deployment
      name: abclang
      fieldPath: spec.template.spec.containers.[name=abclang].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: abclang
        fieldPaths:
          - spec.template.spec.containers.[name=abclang].env.[name=VERSION].value
          - spec.template.metadata.labels.version
