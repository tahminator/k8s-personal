apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: production
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
        version: "N/A"
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              value: https://vault.tahmid.io
            - name: ROCKET_PORT
              value: "80"
            - name: SIGNUPS_ALLOWED
              value: "true"
          envFrom:
            - secretRef:
                name: vaultwarden-production-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-pvc
