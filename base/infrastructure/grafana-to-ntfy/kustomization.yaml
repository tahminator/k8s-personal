apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - secrets.yaml
  - service.yaml
images:
  - name: kittyandrew/grafana-to-ntfy
    newTag: 2026.3.15

replacements:
  - source:
      kind: Deployment
      name: grafana-to-ntfy
      fieldPath: spec.template.spec.containers.[name=grafana-to-ntfy].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: grafana-to-ntfy
        fieldPaths:
          - spec.template.metadata.labels.version
