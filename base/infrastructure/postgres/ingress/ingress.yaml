apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: postgres-tcp
  namespace: infrastructure
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`db.tahmid.io`)
      services:
        - name: postgres
          port: 5432
  tls:
    secretName: postgres-k8s-tls
    options:
      name: postgres-tls-protocol
      namespace: infrastructure
