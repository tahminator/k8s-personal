apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: infrastructure
spec:
  interval: 30m
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  # https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
  values:
    additionalArguments:
      - --metrics.prometheus=true
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.fields.names.ClientUsername=drop
      - --accesslog.fields.headers.defaultmode=keep
    persistence:
      enabled: true
      size: 1Gi
    deployment:
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
    providers:
      kubernetesIngress:
        enabled: true
        allowExternalNameServices: true
      kubernetesCRD:
        enabled: true
        allowExternalNameServices: true
    ports:
      web: {}
      websecure:
        http:
          tls:
            enabled: true
      postgres:
        port: 5432
        expose:
          default: true
        exposedPort: 5432
        protocol: TCP
      redis:
        port: 6379
        expose:
          default: true
        exposedPort: 6379
        protocol: TCP
