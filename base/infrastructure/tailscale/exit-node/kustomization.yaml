apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rbac.yaml
  - deployment.yaml
  - secrets.yaml

images:
  - name: qmcgaw/gluetun
    newTag: v3.41.1
  - name: tailscale/tailscale
    newTag: v1.78.1

replacements:
  - source:
      kind: Deployment
      name: mullvad-exit-node
      fieldPath: spec.template.spec.containers.[name=gluetun].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: mullvad-exit-node
        fieldPaths:
          - spec.template.metadata.labels.gluetun-version
  - source:
      kind: Deployment
      name: mullvad-exit-node
      fieldPath: spec.template.spec.containers.[name=tailscale].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: mullvad-exit-node
        fieldPaths:
          - spec.template.metadata.labels.tailscale-version
