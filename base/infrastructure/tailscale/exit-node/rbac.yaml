apiVersion: v1
kind: ServiceAccount
metadata:
  name: mullvad-exit-node
  namespace: infrastructure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mullvad-exit-node
  namespace: infrastructure
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mullvad-exit-node-state"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mullvad-exit-node
  namespace: infrastructure
subjects:
  - kind: ServiceAccount
    name: mullvad-exit-node
    namespace: infrastructure
roleRef:
  kind: Role
  name: mullvad-exit-node
  apiGroup: rbac.authorization.k8s.io
