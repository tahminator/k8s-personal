apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portfolio-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps/production/portfolio
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: production
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
