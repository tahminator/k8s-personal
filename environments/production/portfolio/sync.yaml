apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portfolio-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./base/production/portfolio
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: production
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  dependsOn:
    - name: cert-manager-issuer-infrastructure
    - name: traefik-infrastructure
    - name: middleware-production
