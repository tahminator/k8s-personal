apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: middleware-staging
  namespace: flux-system
spec:
  interval: 5m
  path: ./base/staging/middleware
  dependsOn:
    - name: traefik-infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: staging
