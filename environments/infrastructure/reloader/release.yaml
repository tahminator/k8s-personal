apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: flux-system
spec:
  releaseName: reloader
  targetNamespace: flux-system
  interval: 10m
  chart:
    spec:
      chart: reloader
      version: 2.2.9
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    reloader:
      reloadStrategy: annotations
