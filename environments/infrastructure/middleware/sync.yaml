apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: middleware-infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./base/infrastructure/middleware
  dependsOn:
    - name: traefik-infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: infrastructure
