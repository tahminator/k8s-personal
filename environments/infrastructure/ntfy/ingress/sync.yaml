apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ntfy-ingress-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./base/infrastructure/ntfy/ingress
  dependsOn:
    - name: cert-manager-issuer-infrastructure
    - name: ntfy-infrastructure
    - name: traefik-infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: infrastructure
