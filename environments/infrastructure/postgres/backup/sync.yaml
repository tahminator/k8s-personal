apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-backup-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./base/infrastructure/postgres/backup
  dependsOn:
    - name: postgres-cluster-infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: infrastructure
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
