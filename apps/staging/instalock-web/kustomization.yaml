apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - secrets.yaml
  - service.yaml
  - monitor.yaml
commonLabels:
  app: instalock-web
  environment: staging
images:
  - name: tahminator/instalock-web
    newTag: staging-5ffce05

replacements:
  - source:
      kind: Kustomization
      fieldPath: images.[name=tahminator/instalock-web].newTag
    targets:
      - select:
          kind: Deployment
          name: instalock-web
        fieldPaths:
          - spec.template.spec.containers.[name=instalock-web].env.[name=VERSION].value
