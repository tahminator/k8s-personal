apiVersion: apps/v1
kind: Deployment
metadata:
  name: instalock-cron
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instalock-cron
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: instalock-cron
        version: "N/A"
    spec:
      containers:
        - name: instalock-cron
          image: tahminator/instalock-cron
          ports:
            - containerPort: 3051
          readinessProbe:
            httpGet:
              path: /
              port: 3051
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3051
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            - name: NODE_ENV
              value: staging
            - name: VERSION
              value: "N/A"
          envFrom:
            - secretRef:
                name: instalock-cron-staging-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "15m"
            limits:
              memory: "256Mi"
              cpu: "500m"
