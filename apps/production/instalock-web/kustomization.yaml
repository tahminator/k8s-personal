apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - secrets.yaml
  - service.yaml
  - monitor.yaml
commonLabels:
  app: instalock-web
  environment: production
images:
  - name: tahminator/instalock-web
    newTag: 1.0.34

replacements:
  - source:
      kind: Deployment
      name: instalock-web
      fieldPath: spec.template.spec.containers.[name=instalock-web].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: instalock-web
        fieldPaths:
          - spec.template.spec.containers.[name=instalock-web].env.[name=VERSION].value
          - spec.template.metadata.labels.version
