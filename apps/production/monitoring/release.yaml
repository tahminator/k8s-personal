apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 1h
  releaseName: kube-prometheus-stack
  targetNamespace: production
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.7.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-creds
        userKey: ADMIN_USER
        passwordKey: ADMIN_PASSWORD
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.production.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
      grafana.ini:
        server:
          root_url: https://grafana.tahmid.io
        database:
          type: postgres
          host: postgres-public.production.svc.cluster.local:5432
          name: grafana
          user: grafana
          password: $__env{DB_PASSWORD}
        smtp:
          enabled: true
          host: $__env{SMTP_HOST}
          user: $__env{SMTP_USER}
          password: $__env{SMTP_PASSWORD}
          from_address: $__env{SMTP_USER}
          from_name: Grafana (k8s-personal)
      envFromSecrets:
        - name: grafana-creds
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          defaultFolderName: "K8S"
    prometheus:
      enabled: true
      prometheusSpec:
        retention: 30d
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        scrapeConfigNamespaceSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 1h
  releaseName: loki
  targetNamespace: production
  chart:
    spec:
      chart: loki
      version: "6.6.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      limits_config:
        retention_period: 336h  # 14 days
      compactor:
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 150
        delete_request_store: filesystem
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2026-03-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    gateway:
      enabled: false
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  interval: 1h
  releaseName: promtail
  targetNamespace: production
  chart:
    spec:
      chart: promtail
      version: "6.15.5"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    config:
      clients:
        - url: http://loki:3100/loki/api/v1/push
