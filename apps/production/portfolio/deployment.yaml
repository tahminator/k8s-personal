apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: tahminator/portfolio
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            - name: NODE_ENV
              value: production
          # envFrom:
          #   - secretRef:
          #       name: portfolio-production-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "24m"
            limits:
              memory: "256Mi"
              cpu: "128m"
