apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ntfy
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy
          args:
            - serve
            - --config
            - /etc/ntfy/server.yml
          env:
            - name: NTFY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ntfy-secrets
                  key: NTFY_DATABASE_URL
            - name: NTFY_AUTH_USERS
              valueFrom:
                secretKeyRef:
                  name: ntfy-secrets
                  key: NTFY_AUTH_USERS
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy/server.yml
              subPath: server.yml
            - name: data
              mountPath: /var/lib/ntfy
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-pvc
